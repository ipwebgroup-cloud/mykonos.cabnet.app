fields:
    request_reference:
        label: Request Reference
        disabled: true
        span: left
        comment: Saved reference used across guest follow-up and operator handling.

    status:
        label: Status
        type: dropdown
        span: right
        comment: Keep this aligned with the live stage so the queue and history stay clear.
        options:
            new: New brief
            reviewed: Reviewed
            contacted: Contacted
            proposal_sent: Proposal sent
            awaiting_guest: Awaiting guest
            confirmed: Confirmed
            closed_won: Closed won
            closed_lost: Closed lost
            spam: Spam
            triage: Triage (legacy)
            proposal: Proposal shaping (legacy)
            closed: Closed (legacy)

    priority:
        label: Priority
        type: dropdown
        span: left
        comment: Use urgent and VIP sparingly so the queue stays meaningful.
        options:
            low: Low
            normal: Normal
            high: High
            vip: VIP
            urgent: Urgent

    owner_name:
        label: Owner / Assignee
        span: right

    quick_actions:
        label: Quick Actions
        type: partial
        path: ~/plugins/cabnet/mykonosinquiry/controllers/inquiries/_quick_actions.htm
        span: full

    workflow_continuity:
