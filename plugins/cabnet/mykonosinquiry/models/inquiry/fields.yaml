fields:
    request_reference:
        label: Request Reference
        disabled: true
        span: left
        comment: Server-confirmed inquiry reference used across guest and operator follow-up.

    status:
        label: Status
        type: dropdown
        span: right
        comment: Keep this aligned with the live concierge stage so the queue and history remain trustworthy.
        options:
            new: New brief
            reviewed: Reviewed
            contacted: Contacted
            proposal_sent: Proposal sent
            awaiting_guest: Awaiting guest
            confirmed: Confirmed
            closed_won: Closed won
            closed_lost: Closed lost
            spam: Spam
            triage: Triage (legacy)
            proposal: Proposal shaping (legacy)
            closed: Closed (legacy)

    priority:
        label: Priority
        type: dropdown
        span: left
        comment: Use urgent and VIP sparingly so the queue remains meaningful.
        options:
            low: Low
            normal: Normal
            high: High
            vip: VIP
            urgent: Urgent

    owner_name:
        label: Owner / Assignee
        span: right

    quick_actions:
        label: Quick Actions
        type: partial
        path: ~/plugins/cabnet/mykonosinquiry/controllers/inquiries/_quick_actions.htm
        span: full

    workflow_continuity:
        label: Workflow Continuity
        type: partial
        path: ~/plugins/cabnet/mykonosinquiry/controllers/inquiries/_workflow_continuity.htm
        span: full

    follow_up_date:
        label: Follow Up Date
        type: datepicker
        mode: date
        span: left

    last_contacted_at:
        label: Last Contacted
        type: datepicker
        mode: datetime
        span: right

    full_name:
        label: Full Name
        span: left

    email:
        label: Email
        span: right

    phone:
        label: Phone
        span: left

    country:
        label: Country
        span: right

    guests:
        label: Guests
        type: number
        span: left

    budget:
        label: Budget
        span: right

    arrival_date:
        label: Arrival Date
        type: datepicker
        mode: date
        span: left

    departure_date:
        label: Departure Date
        type: datepicker
        mode: date
        span: right

    details:
        label: Guest Brief
        type: textarea
        size: giant

tabs:
    fields:
        guest_snapshot:
            label: Guest Snapshot
            type: textarea
            size: large
            tab: Overview
            readOnly: true
            comment: Fast operator view of guest identity and contact details.

        stay_snapshot:
            label: Stay Snapshot
            type: textarea
            size: large
            tab: Overview
            readOnly: true
            comment: Trip timing, guest count, and general stay profile.

        source_snapshot:
            label: Source Snapshot
            type: textarea
            size: large
            tab: Overview
            readOnly: true
            comment: Where this inquiry came from and how it entered the system.

        concierge_brief:
            label: Concierge Brief
            type: textarea
            size: giant
            tab: Overview
            readOnly: true
            comment: Consolidated operator-ready summary of services, preferences, and guest brief.

