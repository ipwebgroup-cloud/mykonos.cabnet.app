fields:
    request_reference:
        label: Request Reference
        disabled: true
        span: left
        comment: Server-confirmed inquiry reference used across guest and operator follow-up.

    status:
        label: Status
        type: dropdown
        span: right
        comment: Keep this aligned with the live concierge stage so the queue and history remain trustworthy.
        options:
            new: New brief
            reviewed: Reviewed
            contacted: Contacted
            proposal_sent: Proposal sent
            awaiting_guest: Awaiting guest
            confirmed: Confirmed
            closed_won: Closed won
            closed_lost: Closed lost
            spam: Spam
            triage: Triage (legacy)
            proposal: Proposal shaping (legacy)
            closed: Closed (legacy)

    priority:
        label: Priority
        type: dropdown
        span: left
        comment: Use urgent and VIP sparingly so the queue remains meaningful.
        options:
            low: Low
            normal: Normal
            high: High
            vip: VIP
            urgent: Urgent

    owner_name:
        label: Owner / Assignee
        span: right
        comment: Use a real assignee name so hand-off continuity stays clear.

    quick_actions:
        label: Quick Actions
        type: partial
        path: ~/plugins/cabnet/mykonosinquiry/controllers/inquiries/_quick_actions.htm
        span: full

    workflow_continuity:
        label: Workflow Continuity
        type: partial
        path: ~/plugins/cabnet/mykonosinquiry/controllers/inquiries/_workflow_continuity.htm
        span: full
        comment: Read-only queue, assignment, and next-action summary for cleaner operator hand-off.

    follow_up_date:
        label: Follow Up Date
        type: datepicker
        mode: date
        span: left
        comment: Next operator checkpoint. Keep this explicit so overdue and due-today inquiries stay visible.

    last_contacted_at:
        label: Last Contacted
        type: datepicker
        mode: datetime
        span: right
        comment: Most recent successful outreach to the guest. Use this with Follow Up Date for continuity.

    full_name:
        label: Full Name
        span: left

    email:
        label: Email
        span: right

    phone:
        label: Phone
        span: left

    country:
        label: Country
        span: right

    guests:
        label: Guests
        type: number
        span: left

    budget:
        label: Budget
        span: right

    arrival_date:
        label: Arrival Date
        type: datepicker
        mode: date
        span: left

    departure_date:
        label: Departure Date
        type: datepicker
        mode: date
        span: right

    details:
        label: Guest Brief
        type: textarea
        size: giant
        comment: Primary free-text brief captured from the guest-facing inquiry flow.

