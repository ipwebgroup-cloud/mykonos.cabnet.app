fields:
    create_transfer_guidance:
        label: Transfer Guidance
        type: partial
        context: create
        path: ~/plugins/cabnet/mykonosinquiry/controllers/loyaltyrecords/_create_transfer_guidance_panel.htm
        span: full
        comment: Use inquiry-based prefill when possible so the first loyalty record starts with anchored source context.

    request_reference:
        label: Request Reference
        disabled: true
        span: left
        comment: Saved reference carried forward from the source inquiry when available.

    source_inquiry_id:
        label: Source Inquiry ID
        disabled: true
        span: right
        comment: Read-only source inquiry link. Add ?source_inquiry_id=INQUIRY_ID to the create URL to prefill from an inquiry.

    create_source_inquiry_context:
        label: Source Inquiry Context
        type: partial
        context: create
        path: ~/plugins/cabnet/mykonosinquiry/controllers/loyaltyrecords/_create_source_inquiry_context.htm
        span: left
        comment: Create-mode source summary and seed check for inquiry-backed loyalty drafts.

    admin_help_sidebar_create:
        label: Help & Glossary
        type: partial
        context: create
        path: ~/plugins/cabnet/mykonosinquiry/controllers/loyaltyrecords/_help_sidebar.htm
        span: right
        comment: Centralized docs, help, and glossary panel for loyalty create work.
